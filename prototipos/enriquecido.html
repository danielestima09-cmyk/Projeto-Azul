<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto Azul — Protótipo (Versão Enriquecida)</title>
<style>
  :root{
    --azul-deep:#002A8F; --azul:#0060B7; --azul-sky:#00A3E0; --azul-soft:#E8F1FB;
    --ora:#00875A; --yel:#FFC72C; --grn:#43B02A; --pur:#6D2077; --mag:#6D2077;
    --ink:#16233D; --mut:#5B6B84; --line:#E2E8F2; --bg:#F4F7FC; --card:#FFFFFF;
    --ok:#1F9D55; --warn:#E7A600; --shadow:0 4px 18px rgba(0,42,143,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",Roboto,-apple-system,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  .hidden{display:none!important}
  .topbar{height:60px;background:linear-gradient(100deg,var(--azul-deep),var(--azul));display:flex;align-items:center;justify-content:space-between;padding:0 20px;color:#fff;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,42,143,.25)}
  .brand{display:flex;align-items:center;gap:12px}
  .brand-logo-wrap{background:#fff;border-radius:9px;padding:5px 10px;display:flex;align-items:center;box-shadow:0 1px 5px rgba(0,0,0,.18)}
  .brand-logo{height:26px;display:block}
  .wordmark{font-weight:800;font-size:22px;letter-spacing:.5px;display:flex;align-items:center;gap:2px}
  .wordmark .l1{color:#BFE3FF}.wordmark .l2{color:#7FC4F0}.wordmark .l3{color:#fff}.wordmark .l4{color:#DCEEFF}
  .mosaic{display:grid;grid-template-columns:repeat(3,6px);grid-gap:2px;margin-left:4px}
  .mosaic i{width:6px;height:6px;border-radius:1px;display:block}
  .app-name{font-size:12px;opacity:.85;border-left:1px solid rgba(255,255,255,.3);padding-left:12px;margin-left:4px}
  .app-name .tagE{background:var(--ora);padding:1px 7px;border-radius:20px;font-weight:700;margin-left:6px}
  .top-right{display:flex;align-items:center;gap:16px}
  .persona-switch{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.14);padding:6px 10px;border-radius:30px}
  .persona-switch select{background:transparent;border:none;color:#fff;font-weight:600;font-size:13px;outline:none}
  .persona-switch select option{color:#16233D}
  .bell{position:relative;font-size:18px}
  .bell .dot{position:absolute;top:-4px;right:-6px;background:var(--ora);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 5px}
  .avatar{width:34px;height:34px;border-radius:50%;background:#fff;color:var(--azul-deep);display:grid;place-items:center;font-weight:700;font-size:13px}
  .shell{display:flex;min-height:calc(100vh - 60px)}
  .sidebar{width:230px;background:var(--card);border-right:1px solid var(--line);padding:16px 12px;flex-shrink:0}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:var(--mut);font-weight:600;margin-bottom:4px;cursor:pointer;transition:.15s}
  .nav-item:hover{background:var(--azul-soft);color:var(--azul-deep)}
  .nav-item.active{background:linear-gradient(100deg,var(--azul-deep),var(--azul));color:#fff}
  .nav-item .ico{width:20px;text-align:center}
  .nav-item .badge{margin-left:auto;background:var(--ora);color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:1px 7px}
  .nav-item .badge.new{background:var(--grn)}
  .nav-item.active .badge{background:#fff;color:var(--ora)}
  .side-label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#9AA8BE;padding:14px 14px 6px}
  .main{flex:1;padding:26px 32px;max-width:1220px}
  .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .page-head h1{font-size:22px;font-weight:800}
  .page-head p{color:var(--mut);font-size:13px;margin-top:2px}
  .btn{background:var(--azul);color:#fff;padding:10px 18px;border-radius:9px;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:8px;box-shadow:var(--shadow)}
  .btn:hover{background:var(--azul-deep)}
  .btn.ghost{background:#fff;color:var(--azul);border:1px solid var(--line);box-shadow:none}.btn.ghost:hover{background:var(--azul-soft)}
  .btn.ora{background:var(--ora)}.btn.ora:hover{background:#00694A}
  .btn.grn{background:var(--grn)}.btn.grn:hover{background:#369022}
  .btn.ia{background:linear-gradient(100deg,#6D2077,#9b3bb0)}.btn.ia:hover{filter:brightness(1.08)}
  .btn.sm{padding:7px 12px;font-size:12px}
  .btn.danger{background:#fff;color:var(--mag);border:1px solid #D9BCE3;box-shadow:none}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .grid{display:grid;gap:16px}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .filters select,.filters input{padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:13px;outline:none}
  .filters input{min-width:220px}
  .badge-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;display:inline-block}
  .st-rascunho{background:#EEF1F6;color:#5B6B84}.st-alinhamento{background:#FEEFE0;color:#00694A}
  .st-revisao{background:#FFF3DA;color:#8A6D00}.st-analise{background:#E1F0FF;color:#0060B7}
  .st-aprovado{background:#E3F6E9;color:#1F9D55}.st-divulgacao{background:#F1E7F7;color:#6D2077}.st-concluido{background:#DCF3F1;color:#0B7A70}
  .chip{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
  .p-alta{background:#F3E8F7;color:#6D2077}.p-media{background:#FFF7DA;color:#8A6D00}.p-baixa{background:#E7F0FE;color:#3E6DB5}
  .vis-int{background:#EDE4F5;color:#6D2077}.vis-pub{background:#E1F0FF;color:#0060B7}
  .sla{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
  .sla-ok{background:#E3F6E9;color:#1F9D55}.sla-warn{background:#FFF7DA;color:#8A6D00}.sla-late{background:#F3E8F7;color:#6D2077}
  .proj-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .proj-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;border-left:5px solid var(--azul-sky)}
  .proj-card:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,42,143,.14)}
  .proj-card h3{font-size:15px;margin-bottom:6px}
  .proj-meta{display:flex;align-items:center;gap:8px;color:var(--mut);font-size:12px;margin:8px 0;flex-wrap:wrap}
  .proj-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
  .mini{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:5px}
  .tag-vert{font-size:11px;background:var(--azul-soft);color:var(--azul-deep);font-weight:700;padding:2px 9px;border-radius:20px}
  .tag-tipo{font-size:11px;background:#E3F5EC;color:#00694A;font-weight:700;padding:2px 9px;border-radius:20px}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:18px 0;flex-wrap:wrap}
  .tab{padding:10px 16px;font-weight:700;color:var(--mut);border-bottom:3px solid transparent;cursor:pointer;font-size:13px}
  .tab.active{color:var(--azul-deep);border-color:var(--azul)}
  .tab .nw{font-size:9px;background:var(--grn);color:#fff;padding:1px 5px;border-radius:8px;margin-left:5px;vertical-align:middle}
  .kv{display:grid;grid-template-columns:180px 1fr;gap:10px 16px;margin:6px 0}
  .kv dt{color:var(--mut);font-weight:600}.kv dd{color:var(--ink)}
  .timeline{position:relative;padding-left:22px}
  .timeline::before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
  .tl-item{position:relative;padding:6px 0 16px}
  .tl-item::before{content:"";position:absolute;left:-20px;top:8px;width:12px;height:12px;border-radius:50%;background:var(--azul);border:2px solid #fff;box-shadow:0 0 0 2px var(--azul-soft)}
  .comment{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;background:#fff}
  .comment.internal{background:#FBF8FE;border-color:#EADCF7}
  .c-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .attach{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;background:#fff}
  .attach .ficon{width:40px;height:40px;border-radius:8px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px}
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:20px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .stat .n{font-size:30px;font-weight:800;color:var(--azul-deep)}
  .stat .t{color:var(--mut);font-size:12px;font-weight:600;margin-top:2px}
  .stat.hl{background:linear-gradient(120deg,#FFF6EC,#fff);border-color:#F6D9B8}
  .stat.hl .n{color:var(--ora)}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:900px){.charts{grid-template-columns:1fr}}
  .chart-title{font-weight:700;font-size:14px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .nw-pill{font-size:9px;background:var(--grn);color:#fff;padding:1px 6px;border-radius:8px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .bar-row .lbl{width:120px;font-size:12px;color:var(--mut);text-align:right}
  .bar-track{flex:1;background:#EEF2F8;border-radius:8px;height:22px;overflow:hidden;position:relative}
  .bar-fill{height:100%;border-radius:8px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11px;font-weight:700}
  .funnel{display:flex;flex-direction:column;gap:8px;align-items:center}
  .funnel .fseg{color:#fff;font-weight:700;font-size:13px;padding:10px;border-radius:8px;text-align:center}
  .donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .legend{font-size:12px}.legend div{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .legend .sw{width:12px;height:12px;border-radius:3px}
  .list-row{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:#fff}
  .list-row .ic{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;color:#fff;flex-shrink:0}
  .notif.unread{border-left:4px solid var(--ora)}
  .dot-new{width:8px;height:8px;border-radius:50%;background:var(--ora);flex-shrink:0}
  .modal-bg{position:fixed;inset:0;background:rgba(16,35,61,.5);display:grid;place-items:center;z-index:100;padding:20px}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:660px;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
  .modal-head h2{font-size:18px}
  .modal-body{padding:22px}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff}
  .field{margin-bottom:16px}
  .field label{display:block;font-weight:700;font-size:12px;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:13px;font-family:inherit;outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--azul)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .x{font-size:22px;color:var(--mut);line-height:1}
  .req{color:var(--mag)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:30px;font-weight:600;font-size:13px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.3);opacity:0;transition:.3s}
  .toast.show{opacity:1;bottom:36px}
  .empty{text-align:center;color:var(--mut);padding:50px 20px}.empty .big{font-size:40px;margin-bottom:10px}
  .banner{background:var(--azul-soft);border:1px solid #CBE1F7;border-radius:12px;padding:12px 16px;font-size:12px;color:var(--azul-deep);margin-bottom:18px;display:flex;gap:10px;align-items:center}
  .banner.warn{background:#FFF6EC;border-color:#F6D9B8;color:#00694A}
  .info-pill{font-size:11px;background:#EEF1F6;color:var(--mut);padding:2px 9px;border-radius:20px;font-weight:600}
  /* IA box */
  .ia-box{background:linear-gradient(120deg,#F7F0FB,#fff);border:1px solid #E6D5F1;border-radius:12px;padding:16px;margin-bottom:14px}
  .ia-box .h{display:flex;align-items:center;gap:8px;font-weight:800;color:var(--pur);margin-bottom:8px}
  .ia-box ul{margin:6px 0 0 18px}.ia-box li{margin-bottom:4px}
  /* Proofing / artboard */
  .artboard{position:relative;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#0a2a54;min-height:340px}
  .art-kv{position:absolute;inset:0;background:linear-gradient(135deg,#0060B7,#002A8F 70%);display:flex;flex-direction:column;justify-content:center;padding:34px;color:#fff}
  .art-kv .eyebrow{font-size:12px;letter-spacing:2px;opacity:.85;text-transform:uppercase}
  .art-kv h2{font-size:34px;line-height:1.1;margin:10px 0;font-weight:800;max-width:70%}
  .art-kv .price{font-size:15px;background:var(--ora);display:inline-block;padding:6px 12px;border-radius:8px;font-weight:800;width:max-content}
  .art-kv .plane{position:absolute;right:-10px;bottom:-10px;font-size:150px;opacity:.18;transform:rotate(-18deg)}
  .art-kv .mos{position:absolute;top:20px;right:24px;display:grid;grid-template-columns:repeat(4,12px);gap:3px}
  .art-kv .mos i{width:12px;height:12px;border-radius:2px}
  .pin{position:absolute;width:26px;height:26px;border-radius:50% 50% 50% 0;background:var(--ora);transform:rotate(-45deg);cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,.35);display:grid;place-items:center;border:2px solid #fff}
  .pin b{transform:rotate(45deg);color:#fff;font-size:12px}
  .pin.sel{background:var(--mag);z-index:5}
  .annot{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;background:#fff;display:flex;gap:12px;cursor:pointer}
  .annot.sel{border-color:var(--ora);box-shadow:0 0 0 2px #D6F0E2}
  .annot .num{width:24px;height:24px;border-radius:50%;background:var(--ora);color:#fff;font-weight:700;display:grid;place-items:center;flex-shrink:0;font-size:12px}
  .est{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
  .est-ok{background:#E3F6E9;color:#1F9D55}.est-adj{background:#FFF7DA;color:#8A6D00}.est-mud{background:#F3E8F7;color:#6D2077}
  .checkitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
  .checkitem .box{width:20px;height:20px;border-radius:5px;display:grid;place-items:center;color:#fff;flex-shrink:0}
  .compare{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .compare .b{padding:12px;border-radius:10px;border:1px solid var(--line)}
  .compare .b.exp{background:#F4F7FC}.compare .b.real{background:#E3F6E9;border-color:#BEE7CB}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <span class="brand-logo-wrap"><img class="brand-logo" src="../public/logo-azul.png" alt="Azul"></span>
    <span class="app-name">Projeto Azul<span class="tagE">Enriquecido</span></span>
  </div>
  <div class="top-right">
    <div class="persona-switch"><span style="font-size:16px">👤</span><select id="personaSel" onchange="setPersona(this.value)"></select></div>

</div>
<div class="shell"><aside class="sidebar" id="sidebar"></aside><main class="main" id="main"></main></div>
<div id="modalHost"></div>

function slaState(p){const lim=SLA_ETAPA[p.status]||0;if(!lim)return{cls:'sla-ok',txt:'—',late:false};if(p.diasNaEtapa>lim)return{cls:'sla-late',txt:`⏰ ${p.diasNaEtapa}d / ${lim}d`,late:true};if(p.diasNaEtapa>=lim-1)return{cls:'sla-warn',txt:`${p.diasNaEtapa}d / ${lim}d`,late:false};return{cls:'sla-ok',txt:`${p.diasNaEtapa}d / ${lim}d`,late:false}}
function setPersona(id){state.persona=id;state.view='projetos';state.proj=null;render()}

function canSeeComment(c){const p=userById(state.persona);if(c.vis==='publico')return true;return['Membro do Marketing','Coordenador de Marketing','Presidente'].includes(p.cargo)}
function visibleProjects(){const p=userById(state.persona);let l=[...PROJETOS];if(p.cargo==='Tripulante de Vertente'||p.cargo==='Diretor de Vertente')l=l.filter(x=>x.vert===p.vert);if(p.cargo==='Membro do Marketing'||p.cargo==='Coordenador de Marketing')l=l.filter(x=>['alinhamento','analise','aprovado','divulgacao','concluido'].includes(x.status));return l}

function render(){
  document.getElementById('personaSel').innerHTML=USERS.map(u=>`<option value="${u.id}" ${u.id===state.persona?'selected':''}>${u.nome} — ${u.cargo}</option>`).join('');
  const p=userById(state.persona);
  document.getElementById('avatar').textContent=initials(p.nome);
  document.getElementById('bellCount').textContent=NOTIFS.filter(n=>n.user===state.persona&&n.unread).length||'';
  renderSidebar();
  const m=document.getElementById('main');
  const map={projetos:viewProjetos,detalhe:viewDetalhe,dashboard:viewDashboard,prazos:viewPrazos,reunioes:viewReunioes,marca:viewMarca,notificacoes:viewNotificacoes,admin:viewAdmin};
  m.innerHTML=(map[state.view]||viewProjetos)();
}
function renderSidebar(){
  const p=userById(state.persona);let items=[...NAV];
  if(p.cargo==='Administrador')items=[{id:'admin',ico:'⚙️',label:'Administração'},...NAV];
  const pend=NOTIFS.filter(n=>n.user===state.persona&&n.unread).length;
  document.getElementById('sidebar').innerHTML=`<div class="side-label">Navegação</div>`+
    items.map(n=>{let badge='';if(n.id==='notificacoes'&&pend)badge=`<span class="badge">${pend}</span>`;else if(n.new)badge=`<span class="badge new">novo</span>`;
      const active=(state.view===n.id||(state.view==='detalhe'&&n.id==='projetos'))?'active':'';
      return `<div class="nav-item ${active}" onclick="go('${n.id}')"><span class="ico">${n.ico}</span>${n.label}${badge}</div>`}).join('')+
    `<div class="side-label">Sessão</div><div style="padding:10px 14px;background:var(--azul-soft);border-radius:10px"><div style="font-weight:700;font-size:13px">${p.nome}</div><div style="font-size:11px;color:var(--mut);margin-top:2px">${p.cargo}</div><div style="font-size:11px;color:var(--mut)">${p.vert!=='-'&&p.vert!=='mkt'?vertById(p.vert):(p.vert==='mkt'?'Marketing':'—')}</div></div>`;
}

function viewProjetos(){
  const p=userById(state.persona);let list=visibleProjects();

  if(state.fVert)list=list.filter(x=>x.vert===state.fVert);
  if(state.fBusca)list=list.filter(x=>x.nome.toLowerCase().includes(state.fBusca.toLowerCase()));
  const canCreate=p.cargo==='Tripulante de Vertente';
  const late=list.filter(x=>slaState(x).late).length;
  const heads={'Tripulante de Vertente':'Projetos que você criou','Diretor de Vertente':'Projetos da sua vertente','Membro do Marketing':'Projetos aguardando parecer','Coordenador de Marketing':'Pendências de aprovação','Presidente':'Todos os projetos','Administrador':'Todos os projetos'};
  return `<div class="page-head"><div><h1>${heads[p.cargo]||'Projetos'}</h1><p>${list.length} projeto(s) · visão de ${p.cargo}</p></div>${canCreate?`<button class="btn" onclick="modalCriar()">＋ Criar projeto</button>`:''}</div>
  ${late?`<div class="banner warn">⏰ <b>${late}</b> projeto(s) com prazo de etapa estourado — veja <b onclick="go('prazos')" style="cursor:pointer;text-decoration:underline">Prazos & SLA</b>.</div>`:''}

    <input placeholder="🔎 Buscar projeto..." value="${state.fBusca}" oninput="state.fBusca=this.value;render()">
    <select onchange="state.fStatus=this.value;render()"><option value="">Todos os status</option>${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${state.fStatus===k?'selected':''}>${v.label}</option>`).join('')}</select>
    <select onchange="state.fVert=this.value;render()"><option value="">Todas as vertentes</option>${VERTENTES.map(v=>`<option value="${v.id}" ${state.fVert===v.id?'selected':''}>${v.nome}</option>`).join('')}</select>
  </div>
  ${list.length?`<div class="proj-list">${list.map(projCard).join('')}</div>`:`<div class="empty"><div class="big">📭</div>Nenhum projeto encontrado.</div>`}`;
}
function projCard(x){
  const st=STATUS[x.status];const s=slaState(x);const nc=COMENTARIOS.filter(c=>c.proj===x.id).length;const na=ANEXOS.filter(a=>a.proj===x.id).length;
  return `<div class="proj-card" style="border-left-color:${st.color}" onclick="openProj('${x.id}')">
    <div style="display:flex;justify-content:space-between;align-items:start;gap:8px"><h3>${x.nome}</h3><span class="badge-status ${st.cls}">${st.label}</span></div>
    <div class="proj-meta"><span class="tag-vert">${vertById(x.vert)}</span><span class="tag-tipo">${tipoById(x.tipo)}</span>${SLA_ETAPA[x.status]?`<span class="sla ${s.cls}">${s.txt}</span>`:''}</div>
    <p style="color:var(--mut);font-size:12.5px">${x.objetivo}</p>
    <div class="proj-foot"><span class="mini">👤 ${userById(x.criador).nome.split(' ')[0]} · ${x.criadoEm}</span><span class="mini">💬 ${nc} · 📎 ${na}</span></div>
  </div>`;
}

function actionsFor(x,p){

  if(p.cargo==='Coordenador de Marketing'&&x.status==='analise')return `<button class="btn grn sm" onclick="modalAssinar('${x.id}')">✔ Aprovar (e-assinatura)</button><button class="btn danger sm" onclick="act('reprovou o projeto')">✖ Reprovar</button><button class="btn ora sm" onclick="modalReuniao('${x.id}')">📅 Reunião</button>`;
  if(p.cargo==='Tripulante de Vertente'&&x.status==='rascunho'&&x.criador===p.id)return `<button class="btn ora sm" onclick="act('solicitou alinhamento com o Marketing')">💬 Alinhar c/ Marketing</button><button class="btn sm" onclick="act('submeteu ao Diretor')">➤ Submeter</button>`;

}
function tabAnexos(x){const as=ANEXOS.filter(a=>a.proj===x.id);
  return `${as.length?as.map(a=>`<div class="attach"><div class="ficon" style="background:${a.cor}">${a.tipo}</div><div style="flex:1"><div style="font-weight:700">${a.nome} ${a.arte?'<span class="info-pill">revisável</span>':''}</div><div style="font-size:12px;color:var(--mut)">${a.tam}</div></div>${a.arte?`<button class="btn ghost sm" onclick="setTab('arte')">🎨 Revisar</button>`:''}<button class="btn ghost sm" onclick="toast('Download simulado')">⬇</button></div>`).join(''):`<div class="empty"><div class="big">📎</div>Nenhum anexo.</div>`}<button class="btn ghost sm" style="margin-top:6px" onclick="toast('Upload simulado')">＋ Anexar</button>`;}
function tabReunioes(x){const rs=REUNIOES.filter(r=>r.proj===x.id);
  return `${rs.length?rs.map(r=>`<div class="list-row"><div class="ic" style="background:var(--pur)">📅</div><div style="flex:1"><b>${r.titulo}</b><div style="font-size:12px;color:var(--mut)">${r.data} às ${r.hora} · ${r.pauta}</div><div style="margin-top:6px">${r.parts.map(u=>`<span class="info-pill">${userById(u).nome.split(' ')[0]}</span> `).join('')}</div></div></div>`).join(''):`<div class="empty"><div class="big">📅</div>Nenhuma reunião.</div>`}`;}
function tabHistorico(x){const h=HISTORICO[x.id]||[];
  return `<div class="card"><div class="timeline">${h.length?h.map(e=>`<div class="tl-item"><b>${e.para==='rascunho'&&e.de==='—'?'Projeto criado':(STATUS[e.de]?STATUS[e.de].label+' → ':'')+STATUS[e.para].label}</b><div style="font-size:12px;color:var(--mut)">${userById(e.autor).nome} · ${e.data}${e.just?' · '+e.just:''}</div>${e.assinatura?`<div style="font-size:11px;color:var(--ok);margin-top:3px">🔏 E-assinatura: ${e.assinatura} <span class="nw-pill">E10</span></div>`:''}</div>`).join(''):'<div class="empty">Sem histórico.</div>'}</div></div>`;}

/* ---------- DASHBOARD (com retrabalho E5 / resultado E6) ---------- */
function viewDashboard(){
  const byStatus={};Object.keys(STATUS).forEach(k=>byStatus[k]=PROJETOS.filter(p=>p.status===k).length);
  const orcTotal=PROJETOS.reduce((s,p)=>s+p.orc,0);
  const comRetrab=PROJETOS.filter(p=>p.reprovacoes>0).length;const taxaRetrab=Math.round(comRetrab/PROJETOS.length*100);
  const late=PROJETOS.filter(p=>slaState(p).late).length;const onTime=Math.round((PROJETOS.length-late)/PROJETOS.length*100);
  const byVert=VERTENTES.map(v=>({nome:v.nome,n:PROJETOS.filter(p=>p.vert===v.id).length}));const maxV=Math.max(...byVert.map(v=>v.n),1);
  const funnel=['rascunho','alinhamento','revisao','analise','aprovado','divulgacao','concluido'];const maxF=Math.max(...Object.values(byStatus),1);
  const mcolors=['#0060B7','#00A3E0','#43B02A','#FFC72C','#00875A','#6D2077','#6D2077'];
  return `<div class="page-head"><div><h1>Dashboard Executivo</h1><p>Visão consolidada · foco em reduzir e comprovar a queda do retrabalho</p></div><button class="btn ghost" onclick="toast('Exportação simulada (PDF/Excel)')">⬇ Exportar</button></div>
  <div class="stat-row">
    <div class="stat"><div class="n">${PROJETOS.length}</div><div class="t">Projetos ativos</div></div>
    <div class="stat hl"><div class="n">${taxaRetrab}%</div><div class="t">Taxa de retrabalho <span class="nw-pill">E5</span></div></div>
    <div class="stat hl"><div class="n">18d</div><div class="t">Tempo médio até aprovação <span class="nw-pill">E5</span></div></div>
    <div class="stat hl"><div class="n">${onTime}%</div><div class="t">Entregas no prazo <span class="nw-pill">E5</span></div></div>
    <div class="stat"><div class="n" style="font-size:22px">${money(orcTotal)}</div><div class="t">Orçamento planejado</div></div>
  </div>
  <div class="charts">
    <div class="card"><div class="chart-title">Funil de projetos por status</div><div class="funnel">${funnel.map(k=>{const w=40+(byStatus[k]/maxF)*55;return `<div class="fseg" style="width:${w}%;background:${STATUS[k].color}">${STATUS[k].label}: ${byStatus[k]}</div>`}).join('')}</div></div>
    <div class="card"><div class="chart-title">Retrabalho por projeto <span class="nw-pill">E5</span></div>${PROJETOS.map(p=>`<div class="bar-row"><div class="lbl" style="width:150px">${p.nome.slice(0,20)}…</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(p.reprovacoes*30,6)}%;background:${p.reprovacoes>0?'var(--mag)':'var(--grn)'}">${p.reprovacoes} devol.</div></div></div>`).join('')}</div>
    <div class="card"><div class="chart-title">Projetos por vertente</div>${byVert.map((v,i)=>`<div class="bar-row"><div class="lbl">${v.nome}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(v.n/maxV*100,8)}%;background:${mcolors[i%mcolors.length]}">${v.n}</div></div></div>`).join('')}</div>
    <div class="card"><div class="chart-title">Resultado × esperado (concluídos) <span class="nw-pill">E6</span></div>
      ${PROJETOS.filter(p=>p.resultadoReal).map(p=>`<div style="margin-bottom:12px"><b style="font-size:13px">${p.nome}</b>${Object.entries(p.resultadoReal).map(([k,v])=>`<div class="bar-row" style="margin-top:6px"><div class="lbl">${k}</div><div class="bar-track"><div class="bar-fill" style="width:88%;background:var(--grn)">${v}</div></div></div>`).join('')}</div>`).join('')||'<div class="empty">Sem projetos concluídos.</div>'}
    </div>
  </div>`;
}

/* ---------- PRAZOS & SLA (E4) ---------- */
function viewPrazos(){
  const sorted=[...PROJETOS].filter(p=>SLA_ETAPA[p.status]).sort((a,b)=>(slaState(b).late-slaState(a).late)||b.diasNaEtapa-a.diasNaEtapa);
  const late=sorted.filter(p=>slaState(p).late);
  return `<div class="page-head"><div><h1>Prazos & SLA por Etapa <span class="nw-pill">E4</span></h1><p>Visibilidade de gargalos — quanto tempo cada projeto está parado em cada etapa</p></div></div>
  <div class="stat-row"><div class="stat hl"><div class="n">${late.length}</div><div class="t">Projetos com prazo estourado</div></div>
    <div class="stat"><div class="n">${sorted.length-late.length}</div><div class="t">Dentro do prazo</div></div>
    <div class="stat"><div class="n">${SLA_ETAPA.analise}d</div><div class="t">SLA da etapa "Em análise"</div></div></div>
  <div class="card"><div class="chart-title">Fila por tempo de permanência (queue aging)</div>
  ${sorted.map(p=>{const s=slaState(p);const lim=SLA_ETAPA[p.status];return `<div class="list-row"><div class="ic" style="background:${STATUS[p.status].color}">${s.late?'⏰':'⏱️'}</div>
    <div style="flex:1"><b>${p.nome}</b><div style="font-size:12px;color:var(--mut)">${vertById(p.vert)} · etapa "${STATUS[p.status].label}"</div>
      <div class="bar-track" style="margin-top:6px;max-width:340px"><div class="bar-fill" style="width:${Math.min(p.diasNaEtapa/lim*100,100)}%;background:${s.late?'var(--mag)':(p.diasNaEtapa>=lim-1?'var(--warn)':'var(--grn)')}">${p.diasNaEtapa}d</div></div></div>
    <div style="text-align:right"><span class="sla ${s.cls}">${s.txt}</span><div style="font-size:11px;color:var(--mut);margin-top:4px">SLA ${lim} dias</div></div></div>`}).join('')}</div>`;
}

/* ---------- GOVERNANÇA DE MARCA (E7) ---------- */
function viewMarca(){
  const ok=DIRETRIZES.filter(d=>d.ok).length;
  return `<div class="page-head"><div><h1>Governança de Marca <span class="nw-pill">E7</span></h1><p>Biblioteca de diretrizes da marca Azul e checklist de aderência dos projetos</p></div></div>
  <div class="charts">
    <div class="card"><div class="chart-title">📘 Diretrizes da marca Azul</div>
      ${DIRETRIZES.map(d=>`<div class="list-row" style="margin-bottom:8px"><div class="ic" style="background:var(--azul)">📄</div><div style="flex:1"><b>${d.titulo}</b></div><button class="btn ghost sm" onclick="toast('Abrir documento (simulado)')">Ver</button></div>`).join('')}
      <button class="btn ghost sm" style="margin-top:6px" onclick="toast('Cadastro simulado')">＋ Nova diretriz</button>
    </div>
    <div class="card"><div class="chart-title">✅ Checklist — Campanha Campinas–Orlando</div>
      <div class="banner">Aderência à marca: <b style="margin-left:4px">${ok}/${DIRETRIZES.length}</b> itens conformes</div>
      ${DIRETRIZES.map(d=>`<div class="checkitem"><div class="box" style="background:${d.ok?'var(--ok)':'#CBD5E1'}">${d.ok?'✓':''}</div><div style="flex:1;${d.ok?'':'color:var(--mut)'}">${d.titulo}</div>${d.ok?'<span class="est est-ok">Conforme</span>':'<span class="est est-mud">Pendente</span>'}</div>`).join('')}
      <div style="font-size:12px;color:var(--mut);margin-top:8px">O projeto só deve ser aprovado com todos os itens conformes.</div>
    </div>
  </div>`;
}

/* ---------- REUNIÕES / NOTIFS / ADMIN ---------- */
function viewReunioes(){return `<div class="page-head"><div><h1>Reuniões</h1><p>Agendamentos vinculados aos projetos</p></div></div>${REUNIOES.map(r=>`<div class="list-row"><div class="ic" style="background:var(--pur)">📅</div><div style="flex:1"><b>${r.titulo}</b><div style="font-size:12px;color:var(--mut)">${PROJETOS.find(p=>p.id===r.proj).nome}</div><div style="font-size:12px;color:var(--mut);margin-top:2px">${r.pauta}</div><div style="margin-top:6px">${r.parts.map(u=>`<span class="info-pill">${userById(u).nome.split(' ')[0]}</span> `).join('')}</div></div><div style="text-align:right"><div style="font-weight:800;color:var(--azul-deep)">${r.data}</div><div style="font-size:12px;color:var(--mut)">${r.hora}</div></div></div>`).join('')}`;}
function viewNotificacoes(){const ns=NOTIFS.filter(n=>n.user===state.persona);
  return `<div class="page-head"><div><h1>Notificações</h1><p>${ns.filter(n=>n.unread).length} não lida(s)</p></div><button class="btn ghost sm" onclick="markAll()">✔ Marcar todas como lidas</button></div>
  ${ns.length?ns.map(n=>`<div class="list-row notif ${n.unread?'unread':''}">${n.unread?'<div class="dot-new"></div>':'<div style="width:8px"></div>'}<div class="ic" style="background:${n.tipo.includes('Prazo')?'var(--mag)':(n.tipo.includes('anotação')?'var(--ora)':'var(--azul)')}">${n.tipo.includes('Prazo')?'⏰':(n.tipo.includes('anotação')?'🎨':'🔔')}</div><div style="flex:1"><b>${n.tipo}</b><div style="font-size:13px;color:var(--mut)">${n.msg}</div></div><div style="font-size:12px;color:var(--mut)">${n.data}</div></div>`).join(''):`<div class="empty"><div class="big">🔔</div>Nenhuma notificação.</div>`}`;}
function markAll(){NOTIFS.forEach(n=>{if(n.user===state.persona)n.unread=false});render();toast('Notificações marcadas como lidas')}
function viewAdmin(){return `<div class="page-head"><div><h1>Administração</h1><p>Usuários, cargos, vertentes, tipos de projeto e diretrizes de marca</p></div></div>
  <div class="charts"><div class="card"><div class="chart-title">Usuários (${USERS.length})</div>${USERS.map(u=>`<div class="list-row" style="margin-bottom:8px"><div class="avatar" style="background:var(--azul);color:#fff">${initials(u.nome)}</div><div style="flex:1"><b>${u.nome}</b><div style="font-size:12px;color:var(--mut)">${u.email}</div></div><span class="info-pill">${u.cargo}</span></div>`).join('')}</div>
  <div class="card"><div class="chart-title">Tipos de projeto <span class="nw-pill">E1</span></div>${TIPOS.map(t=>`<div class="list-row" style="margin-bottom:8px"><div class="ic" style="background:var(--ora)">🧩</div><div style="flex:1"><b>${t.nome}</b><div style="font-size:12px;color:var(--mut)">${t.campos.join(' · ')}</div></div></div>`).join('')}</div></div>`;}

/* ===== MODAIS ===== */
function closeModal(){document.getElementById('modalHost').innerHTML=''}
function act(msg){toast('Ação registrada: '+userById(state.persona).nome.split(' ')[0]+' '+msg)}
function camposTipo(id){const t=TIPOS.find(t=>t.id===id);return t.campos.map(c=>`<div class="field"><label>${c}</label><input placeholder="${c}..."></div>`).join('')}
function modalCriar(){
  document.getElementById('modalHost').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-head"><h2>Criar novo projeto</h2><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="ia-box"><div class="h">✨ Rascunho assistido por IA <span class="nw-pill">E9</span></div><div style="font-size:12.5px">Descreva a ideia em uma linha e a IA sugere um primeiro brief.</div><div style="display:flex;gap:8px;margin-top:8px"><input placeholder="Ex.: promoção de inverno para o Nordeste" style="flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:9px"><button class="btn ia sm" onclick="toast('Brief gerado pela IA e pré-preenchido (simulado)')">Gerar</button></div></div>
      <div class="field"><label>Tipo de projeto <span class="req">*</span> <span class="nw-pill">E1</span></label><select id="tipoSel" onchange="document.getElementById('camposTipo').innerHTML=camposTipo(this.value)">${TIPOS.map(t=>`<option value="${t.id}">${t.nome}</option>`).join('')}</select></div>
      <div class="field"><label>Nome do projeto <span class="req">*</span></label><input placeholder="Ex.: Campanha Nova Rota..."></div>
      <div class="field"><label>Objetivo <span class="req">*</span></label><textarea rows="2" placeholder="Qual o objetivo?"></textarea></div>
      <div style="background:#FBF6F0;border:1px dashed #F0D6B8;border-radius:10px;padding:12px;margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:#00694A;margin-bottom:8px">Campos específicos do tipo (E1)</div><div id="camposTipo">${camposTipo('rota')}</div></div>
      <div class="row2"><div class="field"><label>Público-alvo <span class="req">*</span></label><input placeholder="Quem?"></div><div class="field"><label>Orçamento <span class="req">*</span></label><input placeholder="R$ 0,00"></div></div>
      <div class="field"><label>Anexos</label><div class="attach" style="border-style:dashed;justify-content:center;color:var(--mut)">📎 Arraste arquivos ou clique (simulado)</div></div>
    </div>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn ora" onclick="closeModal();toast('Rascunho salvo · disponível alinhamento rápido com o Marketing (E3)')">Salvar rascunho</button></div>
  </div></div>`;
}
function modalComentar(pid){
  document.getElementById('modalHost').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-head"><h2>Novo comentário</h2><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body"><div class="row2"><div class="field"><label>Tópico <span class="req">*</span></label><select><option>Público-alvo</option><option>Orçamento</option><option>Metas</option><option>Comunicação</option><option>Outro</option></select></div><div class="field"><label>Prioridade <span class="req">*</span></label><select><option>Alta</option><option>Média</option><option>Baixa</option></select></div></div>
      <div class="field"><label>Visibilidade <span class="req">*</span></label><select><option value="publico">🌐 Público (visível à vertente)</option>${['Membro do Marketing','Coordenador de Marketing'].includes(userById(state.persona).cargo)?'<option value="interno">🔒 Interno (só Marketing)</option>':''}</select></div>
      <div class="field"><label>Descrição <span class="req">*</span></label><textarea rows="3" placeholder="Escreva seu parecer..."></textarea></div>
      <div class="field"><label>@ Mencionar</label><select><option>—</option>${USERS.map(u=>`<option>${u.nome}</option>`).join('')}</select></div></div>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn" onclick="closeModal();toast('Comentário registrado · envolvidos notificados')">Publicar</button></div>
  </div></div>`;
}
function modalReuniao(pid){
  document.getElementById('modalHost').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-head"><h2>Agendar reunião</h2><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body"><div class="field"><label>Título <span class="req">*</span></label><input placeholder="Ex.: Deliberação final"></div><div class="row2"><div class="field"><label>Data <span class="req">*</span></label><input type="date"></div><div class="field"><label>Hora <span class="req">*</span></label><input type="time"></div></div><div class="field"><label>Pauta</label><textarea rows="2"></textarea></div><div class="field"><label>Participantes</label><select multiple size="4">${USERS.map(u=>`<option>${u.nome}</option>`).join('')}</select></div></div>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn ora" onclick="closeModal();toast('Reunião agendada · participantes notificados')">Agendar</button></div>
  </div></div>`;
}
function modalAssinar(pid){
  document.getElementById('modalHost').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-head"><h2>Aprovar com e-assinatura <span class="nw-pill">E10</span></h2><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body"><div class="banner">Você está prestes a dar a <b>palavra final</b> (RN-02) no projeto "${PROJETOS.find(p=>p.id===pid).nome}". A aprovação registrará seu nome, data/hora e a versão aprovada.</div>
      <div class="field"><label>Comentário da aprovação</label><textarea rows="2" placeholder="Observações da deliberação..."></textarea></div>
      <label style="display:flex;gap:8px;align-items:center;font-size:13px"><input type="checkbox" style="width:auto"> Confirmo a aprovação como ${userById(state.persona).nome}</label></div>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn grn" onclick="closeModal();toast('Projeto aprovado e assinado · todos os envolvidos notificados')">🔏 Assinar e aprovar</button></div>
  </div></div>`;
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2600)}
render();
</script>
</body>
</html>
