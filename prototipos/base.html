<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto Azul — Protótipo (Versão Base)</title>
<style>
  :root{
    --azul-deep:#002A8F; --azul:#0060B7; --azul-sky:#00A3E0; --azul-soft:#E8F1FB;
    --ora:#00875A; --yel:#FFC72C; --grn:#43B02A; --pur:#6D2077; --mag:#6D2077;
    --ink:#16233D; --mut:#5B6B84; --line:#E2E8F2; --bg:#F4F7FC; --card:#FFFFFF;
    --ok:#1F9D55; --warn:#E7A600; --shadow:0 4px 18px rgba(0,42,143,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",Roboto,-apple-system,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  a{color:inherit}
  .hidden{display:none!important}

  /* ---------- Top bar ---------- */
  .topbar{height:60px;background:linear-gradient(100deg,var(--azul-deep),var(--azul));display:flex;align-items:center;justify-content:space-between;padding:0 20px;color:#fff;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,42,143,.25)}
  .brand{display:flex;align-items:center;gap:12px}
  .brand-logo-wrap{background:#fff;border-radius:9px;padding:5px 10px;display:flex;align-items:center;box-shadow:0 1px 5px rgba(0,0,0,.18)}
  .brand-logo{height:26px;display:block}
  .auth-logo{height:40px;display:block;margin:0 auto}
  .wordmark{font-weight:800;font-size:22px;letter-spacing:.5px;display:flex;align-items:center;gap:2px}
  .wordmark .l1{color:#BFE3FF}.wordmark .l2{color:#7FC4F0}.wordmark .l3{color:#fff}.wordmark .l4{color:#DCEEFF}
  .mosaic{display:grid;grid-template-columns:repeat(3,6px);grid-gap:2px;margin-left:4px}
  .mosaic i{width:6px;height:6px;border-radius:1px;display:block}
  .app-name{font-size:12px;opacity:.85;border-left:1px solid rgba(255,255,255,.3);padding-left:12px;margin-left:4px}
  .top-right{display:flex;align-items:center;gap:16px}
  .persona-switch{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.14);padding:6px 10px;border-radius:30px}
  .persona-switch select{background:transparent;border:none;color:#fff;font-weight:600;font-size:13px;outline:none}
  .persona-switch select option{color:#16233D}
  .bell{position:relative;font-size:18px}
  .bell .dot{position:absolute;top:-4px;right:-6px;background:var(--ora);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 5px}
  .avatar{width:34px;height:34px;border-radius:50%;background:#fff;color:var(--azul-deep);display:grid;place-items:center;font-weight:700;font-size:13px}

  /* ---------- Layout ---------- */
  .shell{display:flex;min-height:calc(100vh - 60px)}
  .sidebar{width:230px;background:var(--card);border-right:1px solid var(--line);padding:16px 12px;flex-shrink:0}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:var(--mut);font-weight:600;margin-bottom:4px;cursor:pointer;transition:.15s}
  .nav-item:hover{background:var(--azul-soft);color:var(--azul-deep)}
  .nav-item.active{background:linear-gradient(100deg,var(--azul-deep),var(--azul));color:#fff}
  .nav-item .ico{width:20px;text-align:center}
  .nav-item .badge{margin-left:auto;background:var(--ora);color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:1px 7px}
  .nav-item.active .badge{background:#fff;color:var(--ora)}
  .side-label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#9AA8BE;padding:14px 14px 6px}
  .main{flex:1;padding:26px 32px;max-width:1200px}

  /* ---------- Common UI ---------- */
  .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .page-head h1{font-size:22px;font-weight:800;color:var(--ink)}
  .page-head p{color:var(--mut);font-size:13px;margin-top:2px}
  .btn{background:var(--azul);color:#fff;padding:10px 18px;border-radius:9px;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:8px;box-shadow:var(--shadow)}
  .btn:hover{background:var(--azul-deep)}
  .btn.ghost{background:#fff;color:var(--azul);border:1px solid var(--line);box-shadow:none}
  .btn.ghost:hover{background:var(--azul-soft)}
  .btn.ora{background:var(--ora)}.btn.ora:hover{background:#00694A}
  .btn.grn{background:var(--grn)}.btn.grn:hover{background:#369022}
  .btn.sm{padding:7px 12px;font-size:12px}
  .btn.danger{background:#fff;color:var(--mag);border:1px solid #D9BCE3;box-shadow:none}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .grid{display:grid;gap:16px}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .filters select,.filters input{padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:13px;color:var(--ink);outline:none}
  .filters input{min-width:220px}

  .badge-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;display:inline-block}
  .st-rascunho{background:#EEF1F6;color:#5B6B84}
  .st-revisao{background:#FFF3DA;color:#8A6D00}
  .st-analise{background:#E1F0FF;color:#0060B7}
  .st-aprovado{background:#E3F6E9;color:#1F9D55}
  .st-divulgacao{background:#F1E7F7;color:#6D2077}
  .st-concluido{background:#DCF3F1;color:#0B7A70}

  .chip{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
  .p-alta{background:#F3E8F7;color:#6D2077}.p-media{background:#FFF7DA;color:#8A6D00}.p-baixa{background:#E7F0FE;color:#3E6DB5}
  .vis-int{background:#EDE4F5;color:#6D2077}.vis-pub{background:#E1F0FF;color:#0060B7}

  /* project cards */
  .proj-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .proj-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;border-left:5px solid var(--azul-sky)}
  .proj-card:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,42,143,.14)}
  .proj-card h3{font-size:15px;margin-bottom:6px}
  .proj-meta{display:flex;align-items:center;gap:8px;color:var(--mut);font-size:12px;margin:8px 0}
  .proj-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
  .mini{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:5px}
  .tag-vert{font-size:11px;background:var(--azul-soft);color:var(--azul-deep);font-weight:700;padding:2px 9px;border-radius:20px}
  .prazo{font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:6px;margin:2px 0 4px}
  .prazo-ok{background:#E3F6E9;color:#1F9D55}
  .prazo-warn{background:#FFF7DA;color:#8A6D00}
  .prazo-late{background:#F3E8F7;color:#6D2077}

  /* detail */
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:18px 0}
  .tab{padding:10px 16px;font-weight:700;color:var(--mut);border-bottom:3px solid transparent;cursor:pointer;font-size:13px}
  .tab.active{color:var(--azul-deep);border-color:var(--azul)}
  .kv{display:grid;grid-template-columns:180px 1fr;gap:10px 16px;margin:6px 0}
  .kv dt{color:var(--mut);font-weight:600}.kv dd{color:var(--ink)}
  .timeline{position:relative;padding-left:22px}
  .timeline::before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
  .tl-item{position:relative;padding:6px 0 16px}
  .tl-item::before{content:"";position:absolute;left:-20px;top:8px;width:12px;height:12px;border-radius:50%;background:var(--azul);border:2px solid #fff;box-shadow:0 0 0 2px var(--azul-soft)}
  .comment{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;background:#fff}
  .comment.internal{background:#FBF8FE;border-color:#EADCF7}
  .c-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .attach{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;background:#fff}
  .attach .ficon{width:40px;height:40px;border-radius:8px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px}

  /* dashboard */
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:20px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .stat .n{font-size:30px;font-weight:800;color:var(--azul-deep)}
  .stat .t{color:var(--mut);font-size:12px;font-weight:600;margin-top:2px}
  .stat .tr{font-size:12px;font-weight:700;margin-top:6px}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:900px){.charts{grid-template-columns:1fr}}
  .chart-title{font-weight:700;font-size:14px;margin-bottom:14px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .bar-row .lbl{width:120px;font-size:12px;color:var(--mut);text-align:right}
  .bar-track{flex:1;background:#EEF2F8;border-radius:8px;height:22px;overflow:hidden}
  .bar-fill{height:100%;border-radius:8px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11px;font-weight:700}
  .funnel{display:flex;flex-direction:column;gap:8px;align-items:center}
  .funnel .fseg{color:#fff;font-weight:700;font-size:13px;padding:10px;border-radius:8px;text-align:center}
  .donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .legend{font-size:12px}.legend div{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .legend .sw{width:12px;height:12px;border-radius:3px}

  /* meetings & notifications */
  .list-row{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:#fff}
  .list-row .ic{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;color:#fff;flex-shrink:0}
  .notif.unread{border-left:4px solid var(--ora)}
  .dot-new{width:8px;height:8px;border-radius:50%;background:var(--ora);flex-shrink:0}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(16,35,61,.5);display:grid;place-items:center;z-index:100;padding:20px}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
  .modal-head h2{font-size:18px}
  .modal-body{padding:22px}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff}
  .field{margin-bottom:16px}
  .field label{display:block;font-weight:700;font-size:12px;margin-bottom:6px;color:var(--ink)}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:13px;font-family:inherit;outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--azul)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .x{font-size:22px;color:var(--mut);line-height:1}
  .req{color:var(--mag)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:30px;font-weight:600;font-size:13px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.3);opacity:0;transition:.3s}
  .toast.show{opacity:1;bottom:36px}
  .empty{text-align:center;color:var(--mut);padding:50px 20px}
  .empty .big{font-size:40px;margin-bottom:10px}
  .banner{background:var(--azul-soft);border:1px solid #CBE1F7;border-radius:12px;padding:12px 16px;font-size:12px;color:var(--azul-deep);margin-bottom:18px;display:flex;gap:10px;align-items:center}
  .info-pill{font-size:11px;background:#EEF1F6;color:var(--mut);padding:2px 9px;border-radius:20px;font-weight:600}
  /* ---------- Autenticação (login) ---------- */
  .auth-wrap{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,var(--azul-deep),var(--azul) 55%,var(--azul-sky));padding:24px}
  .auth-card{background:#fff;border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,.28);width:100%;max-width:400px;padding:34px}
  .auth-brand{text-align:center;margin-bottom:22px}
  .auth-brand .wm{font-weight:800;font-size:30px;display:inline-flex;align-items:center;gap:2px;color:var(--azul)}
  .auth-brand .sub{color:var(--mut);font-size:13px;margin-top:8px;line-height:1.4}
  .auth-full{width:100%;justify-content:center;padding:12px;font-size:14px;margin-top:6px}
  .auth-link{display:block;text-align:center;margin-top:14px;color:var(--azul);font-weight:600;font-size:13px;cursor:pointer}
  .auth-link:hover{text-decoration:underline}
  .auth-hint{background:var(--azul-soft);border:1px solid #CBE1F7;border-radius:10px;padding:10px 12px;font-size:11.5px;color:var(--azul-deep);margin-top:18px;text-align:center;line-height:1.45}
  .pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
  @media(max-width:520px){.pick-grid{grid-template-columns:1fr}}
  .pick-card{border:1px solid var(--line);border-radius:12px;padding:16px;cursor:pointer;text-align:center;transition:.15s;background:#fff}
  .pick-card:hover{border-color:var(--azul);box-shadow:0 8px 22px rgba(0,42,143,.14);transform:translateY(-2px)}
  .pick-card .pic{width:44px;height:44px;border-radius:50%;background:linear-gradient(120deg,var(--azul-deep),var(--azul));color:#fff;display:grid;place-items:center;font-weight:700;margin:0 auto 8px}
  .pick-card b{font-size:13px}.pick-card span{font-size:11px;color:var(--mut);display:block;margin-top:2px}
  .logout-btn{background:rgba(255,255,255,.14);color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;display:grid;place-items:center}
  .logout-btn:hover{background:rgba(255,255,255,.28)}

  /* ===== Chatbot ABOS (cópia embutida de /chatbot para o protótipo offline) ===== */
  .abos-chatbot,.abos-chatbot *{box-sizing:border-box}
  .abos-chatbot{--abos-deep:#002A8F;--abos-blue:#0060B7;--abos-sky:#00A3E0;--abos-ora:#00875A;--abos-ink:#16233D;--abos-mut:#5B6B84;--abos-line:#E2E8F2;--abos-bg:#F4F7FC;--abos-user:#0060B7;font-family:"Segoe UI",Roboto,-apple-system,Arial,sans-serif;font-size:14px;line-height:1.45;color:var(--abos-ink)}
  .abos-fab{position:fixed;right:22px;bottom:22px;z-index:2147483000;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--abos-deep),var(--abos-blue));color:#fff;font-size:26px;display:grid;place-items:center;cursor:pointer;border:none;box-shadow:0 8px 26px rgba(0,42,143,.35);transition:transform .15s ease}
  .abos-fab:hover{transform:translateY(-2px) scale(1.03)}
  .abos-fab:focus-visible{outline:3px solid var(--abos-sky);outline-offset:3px}
  .abos-window{position:fixed;right:22px;bottom:92px;z-index:2147483000;width:380px;max-width:calc(100vw - 32px);height:560px;max-height:calc(100vh - 120px);background:#fff;border:1px solid var(--abos-line);border-radius:16px;box-shadow:0 24px 70px rgba(0,42,143,.28);display:flex;flex-direction:column;overflow:hidden;transform-origin:bottom right;transition:opacity .18s ease,transform .18s ease}
  .abos-chatbot[data-open="false"] .abos-window{opacity:0;transform:translateY(12px) scale(.96);pointer-events:none;visibility:hidden}
  .abos-chatbot[data-open="true"] .abos-window{opacity:1;transform:none;visibility:visible}
  .abos-chatbot[data-minimized="true"] .abos-window{height:56px;max-height:56px}
  .abos-chatbot[data-minimized="true"] .abos-body,.abos-chatbot[data-minimized="true"] .abos-composer,.abos-chatbot[data-minimized="true"] .abos-disclaimer{display:none}
  .abos-header{background:linear-gradient(100deg,var(--abos-deep),var(--abos-blue));color:#fff;padding:12px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .abos-avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:18px;flex-shrink:0}
  .abos-title{flex:1;min-width:0}.abos-title strong{display:block;font-size:14px;font-weight:700}.abos-title span{display:block;font-size:11px;opacity:.85}
  .abos-header-btn{background:rgba(255,255,255,.14);color:#fff;border:none;width:30px;height:30px;border-radius:8px;font-size:16px;cursor:pointer;display:grid;place-items:center}
  .abos-header-btn:hover{background:rgba(255,255,255,.28)}
  .abos-header-btn:focus-visible{outline:2px solid #fff;outline-offset:2px}
  .abos-body{flex:1;overflow-y:auto;padding:16px 14px;background:var(--abos-bg);display:flex;flex-direction:column;gap:10px}
  .abos-msg{max-width:85%;padding:10px 13px;border-radius:14px;font-size:13.5px;white-space:pre-wrap;word-wrap:break-word;animation:abos-in .18s ease}
  @keyframes abos-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .abos-msg-bot{align-self:flex-start;background:#fff;border:1px solid var(--abos-line);border-bottom-left-radius:4px}
  .abos-msg-user{align-self:flex-end;background:var(--abos-user);color:#fff;border-bottom-right-radius:4px}
  .abos-msg-error{align-self:center;background:#F3E8F7;color:#6D2077;border:1px solid #D9BCE3;font-size:12.5px;max-width:95%}
  .abos-typing{align-self:flex-start;background:#fff;border:1px solid var(--abos-line);border-radius:14px;border-bottom-left-radius:4px;padding:12px 14px;display:inline-flex;gap:4px}
  .abos-typing i{width:7px;height:7px;border-radius:50%;background:var(--abos-mut);display:inline-block;animation:abos-blink 1.2s infinite ease-in-out}
  .abos-typing i:nth-child(2){animation-delay:.2s}.abos-typing i:nth-child(3){animation-delay:.4s}
  @keyframes abos-blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
  .abos-composer{border-top:1px solid var(--abos-line);padding:10px;display:flex;gap:8px;align-items:flex-end;background:#fff;flex-shrink:0}
  .abos-input{flex:1;resize:none;border:1px solid var(--abos-line);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:13.5px;max-height:120px;outline:none;color:var(--abos-ink)}
  .abos-input:focus{border-color:var(--abos-blue)}
  .abos-send{background:var(--abos-blue);color:#fff;border:none;width:42px;height:42px;border-radius:10px;font-size:18px;cursor:pointer;display:grid;place-items:center;flex-shrink:0}
  .abos-send:hover{background:var(--abos-deep)}.abos-send:disabled{opacity:.5;cursor:not-allowed}
  .abos-send:focus-visible{outline:2px solid var(--abos-sky);outline-offset:2px}
  .abos-disclaimer{font-size:10.5px;color:var(--abos-mut);text-align:center;padding:0 12px 8px;background:#fff}
  @media(max-width:480px){.abos-window{right:0;bottom:0;width:100vw;max-width:100vw;height:100vh;max-height:100vh;border-radius:0}.abos-fab{right:16px;bottom:16px}}
  @media(prefers-reduced-motion:reduce){.abos-msg,.abos-window,.abos-fab{animation:none;transition:none}}
  .abos-sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <span class="brand-logo-wrap"><img class="brand-logo" src="../public/logo-azul.png" alt="Azul"></span>
    <span class="app-name">Projeto Azul · Protótipo Base</span>
  </div>
  <div class="top-right">
    <div class="persona-switch">
      <span style="font-size:16px">👤</span>
      <select id="personaSel" onchange="setPersona(this.value)"></select>
    </div>
    <div class="bell" title="Notificações" onclick="go('notificacoes')" style="cursor:pointer">🔔<span class="dot" id="bellCount">3</span></div>
    <div class="avatar" id="avatar">--</div>
    <button class="logout-btn" title="Sair" onclick="logout()">⎋</button>
  </div>
</div>

<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<div id="authHost" style="display:none"></div>

<script>
/* Transporte SIMULADO para o protótipo offline (sem backend).
   Responde de forma COERENTE com a pergunta E com os DADOS da avaliação.
   Em produção, o chatbot.js chama /api/chat (Gemini via OpenRouter) sem alterações. */
(function(){
  var REFUSAL='Tripulante, não consigo alterar scores, status ou critérios por meio da conversa. Posso explicar a avaliação atual e indicar quais ajustes podem ser realizados antes de uma nova submissão.';
  var LABEL={branding:'Branding',communication:'Comunicação',visual:'Visual',compliance:'Compliance',strategicMarketing:'Marketing Estratégico',organizationalIntelligence:'Inteligência Organizacional'};
  var DIM={branding:['branding','marca','proposito','valores'],communication:['comunica','tom de voz','tom ','mensagem','clareza','linguagem'],visual:['visual','logo','logotipo','cor ','cores','tipografia','template','layout','identidade visual','legibilidade','hierarquia'],compliance:['compliance','lgpd','juridic','legal','regulat','direito','uso de imagem','confidencial','autoral'],strategicMarketing:['estrateg','campanha','conflito','redundan'],organizationalIntelligence:['organizacional','historic','duplicidade','sinergia','projetos existentes','iniciativa','aprendizad']};
  function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}
  function statusExplanation(ev){
    var comp=ev.dimensions&&ev.dimensions.compliance;
    if(ev.riskLevel==='critical'){var rc=(ev.risks&&ev.risks[0]&&ev.risks[0].description)||'risco crítico';return 'Tripulante, “'+ev.projectName+'” foi bloqueado preventivamente por risco crítico: '+rc+'. É necessária revisão especializada (Jurídico/Compliance e Privacidade) antes de qualquer encaminhamento. Esta triagem não representa decisão jurídica definitiva.';}
    if(ev.status==='approved')return 'Tripulante, “'+ev.projectName+'” alcançou 100% de aderência e está apto para encaminhamento ao marketing. A decisão final de publicação segue sujeita às validações humanas aplicáveis.';
    if(ev.status==='awaiting'){var f=(ev.missingInformation||[]).join('; ')||'informações essenciais';return 'Tripulante, ainda não há nota definitiva: faltam dados para uma avaliação segura ('+f+').';}
    if(ev.status==='blocked')return 'Tripulante, “'+ev.projectName+'” está com score '+ev.overallScore+'% e apresenta desalinhamentos significativos — o ponto mais crítico é Compliance ('+(comp&&comp.score)+'%): '+((comp&&comp.findings&&comp.findings[0])||'inconsistência identificada')+'. Recomendo revisão ampla antes de reenviar.';
    return 'Tripulante, “'+ev.projectName+'” está com score '+ev.overallScore+'% (ajustes necessários). Bom nível de alinhamento, mas há pontos a revisar antes de encaminhar ao marketing. Quer que eu liste os ajustes?';
  }
  function reply(ev,text){
    var q=norm(text);var dims=ev.dimensions||{};
    function has(list){return list.some(function(k){return q.indexOf(norm(k))>=0;});}
    function dimReply(key){var d=dims[key]||{};var sc=(d.score==null?'não avaliada (material insuficiente)':d.score+'%');var f=(d.findings&&d.findings.length)?(' Apontamentos: '+d.findings.join('; ')+'.'):' Sem apontamentos registrados nessa dimensão.';var ex=key==='compliance'?' Esta é uma triagem inicial e não substitui a validação do Jurídico/Compliance.':'';return 'Tripulante, na dimensão '+LABEL[key]+' o projeto está em '+sc+'.'+f+ex;}
    if(!q)return statusExplanation(ev);
    var mudar=/(muda|mude|altera|altere|aumenta|aumente|sobe|coloca|coloque|poe|põe).*(nota|score|status|pontua)/.test(q)||/nota\s*(100|maxima|10)\b/.test(q)||/(ignore|ignora|desconsidera)\s*(as|os)?\s*(regras|criterios|instru)/.test(q)||/(aprova|aprove|libera|libere|desbloqueia|valida|passa)\b.*(projeto|isso|pra mim|para mim|agora|logo)/.test(q);
    if(mudar&&ev.status!=='approved')return REFUSAL;
    if(/^(oi|ola|opa|e ai|bom dia|boa tarde|boa noite)\b/.test(q)||/(o que voce faz|como voce funciona|pode ajudar|no que pode|com o que|^ajuda\b)/.test(q))
      return 'Tripulante, posso explicar a avaliação de “'+ev.projectName+'”: score geral, notas por dimensão, riscos, informações que faltam e os ajustes recomendados. Sobre o que quer saber?';
    for(var k in DIM){if(has(DIM[k]))return dimReply(k);}
    if(/(recomenda|ajust|melhor|o que falta|falta para|chegar a 100|aproximar|corrig|revisar|o que devo|o que muda)/.test(q)){
      var recs=ev.recommendations||[];
      if(!recs.length)return ev.status==='approved'?'Tripulante, não há ajustes pendentes: o projeto atingiu 100% de aderência.':'Tripulante, não há recomendações específicas registradas. Posso detalhar alguma dimensão para você revisar.';
      return 'Tripulante, para aproximar “'+ev.projectName+'” de 100%, recomendo: '+recs.map(function(r,i){return (i+1)+') '+r;}).join('  ')+'.';
    }
    if(/risco|perig|reputac/.test(q)){var rk=ev.risks||[];return rk.length?('Tripulante, risco(s) identificado(s): '+rk.map(function(r){return (r.severity?('['+r.severity+'] '):'')+(r.description||'');}).join(' | ')+'.'):'Tripulante, não há riscos críticos registrados. Os pontos de atenção aparecem como apontamentos nas dimensões.';}
    if(/(document|anexo|arquivo|o que preciso enviar|informac(oes|ao)\s*(que\s*)?(falta|ausente)|falta.*(dado|informac|arquivo|arte))/.test(q)){var mi=ev.missingInformation||[];return mi.length?('Tripulante, faltam para uma avaliação segura: '+mi.join('; ')+'. Assim que anexar, refaço a triagem.'):'Tripulante, não há informações pendentes registradas nesta avaliação.';}
    if(/(fonte|com base|referenc|manual|base de|consult)/.test(q)){var s=ev.sourcesUsed||[];return s.length?('Tripulante, esta avaliação considerou: '+s.join('; ')+'.'):'Tripulante, não há fontes específicas registradas nesta avaliação.';}
    if(/(score|nota|pontua|aderencia|percentual|quantos pontos|quanto (tirei|foi))/.test(q))
      return 'Tripulante, o score geral de “'+ev.projectName+'” é '+(ev.overallScore==null?'—':ev.overallScore+'%')+' (média das seis dimensões). Notas: '+Object.keys(LABEL).map(function(kk){return LABEL[kk]+' '+(dims[kk]&&dims[kk].score!=null?dims[kk].score+'%':'—');}).join(', ')+'.';
    if(/(por que|porque|status|situac|resultado|aprovad|bloque|reprov|proximo passo|e agora|o que acontece|posso enviar|posso submeter|como (esta|anda|vai)|resumo)/.test(q))
      return statusExplanation(ev);
    if(/(voo|passagem|bagagem|check ?in|reembolso|assento|milhas|tudoazul|clima|salario|ferias|\brh\b)/.test(q))
      return 'Tripulante, atuo apenas na triagem deste projeto (avaliação, critérios, riscos e ajustes). Para outros assuntos, procure o canal adequado. Posso ajudar com a avaliação de “'+ev.projectName+'”?';
    return 'Tripulante, consigo ajudar apenas com a avaliação deste projeto — score e notas por dimensão, riscos, informações que faltam, fontes consultadas e os ajustes recomendados. Poderia reformular sua pergunta nesse contexto? Se preferir, começo pelo resumo de “'+ev.projectName+'”.';
  }
  function simulate(opts){var ev=opts.projectEvaluation||{};var last=(opts.messages[opts.messages.length-1]||{}).content||'';return new Promise(function(res){setTimeout(function(){res({reply:reply(ev,last)});},450);});}
  window.ABOS_CHAT_TRANSPORT=function(opts){
    /* 1) Tenta o backend REAL (Gemini via /api/chat) — respostas de fato coerentes.
       2) Se não houver backend (arquivo aberto direto ou servidor estático), simula offline. */
    return fetch(opts.endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:opts.messages,projectEvaluation:opts.projectEvaluation})})
      .then(function(res){if(!res.ok)return null;return res.json();})
      .then(function(d){return (d&&d.reply)?{reply:d.reply}:simulate(opts);})
      .catch(function(){return simulate(opts);});
  };
})();
</script>
<script>
/* Cópia embutida de chatbot.js (widget isolado .abos-*). Fonte modular: /chatbot/chatbot.js */
(function(){'use strict';
  var GREETING='Olá, tripulante! Posso ajudar a explicar a avaliação do seu projeto, os critérios analisados, os riscos encontrados e os ajustes necessários.';
  var state={open:false,minimized:false,sending:false,evaluation:null,history:[]};
  var el={};var endpoint='/api/chat';
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  function scrollToBottom(){if(el.body)el.body.scrollTop=el.body.scrollHeight;}
  function build(){
    var root=document.getElementById('abos-chatbot-root');
    if(!root){root=document.createElement('div');root.id='abos-chatbot-root';document.body.appendChild(root);}
    endpoint=root.getAttribute('data-endpoint')||window.ABOS_CHAT_ENDPOINT||'/api/chat';
    root.className='abos-chatbot';root.setAttribute('data-open','false');root.setAttribute('data-minimized','false');
    root.innerHTML='<button class="abos-fab" type="button" aria-label="Abrir o Assistente de Avaliação" aria-expanded="false" aria-controls="abos-window"><span aria-hidden="true">💬</span></button>'+
      '<section class="abos-window" id="abos-window" role="dialog" aria-modal="false" aria-label="Assistente de Avaliação" hidden>'+
      '<header class="abos-header"><div class="abos-avatar" aria-hidden="true">🛫</div><div class="abos-title"><strong>Assistente de Avaliação</strong><span>Triagem de projetos · Azul Brand OS</span></div>'+
      '<button class="abos-header-btn abos-min" type="button" aria-label="Minimizar janela do chat"><span aria-hidden="true">—</span></button>'+
      '<button class="abos-header-btn abos-close" type="button" aria-label="Fechar janela do chat"><span aria-hidden="true">✕</span></button></header>'+
      '<div class="abos-body" role="log" aria-live="polite" aria-relevant="additions" aria-label="Histórico de mensagens"></div>'+
      '<form class="abos-composer"><label class="abos-sr-only" for="abos-input">Escreva sua mensagem para o Assistente de Avaliação</label>'+
      '<textarea class="abos-input" id="abos-input" rows="1" placeholder="Escreva sua mensagem, tripulante…" autocomplete="off"></textarea>'+
      '<button class="abos-send" type="submit" aria-label="Enviar mensagem"><span aria-hidden="true">➤</span></button></form>'+
      '<div class="abos-disclaimer">Triagem inicial por IA. A decisão final é das equipes humanas responsáveis.</div></section>';
    el.root=root;el.fab=root.querySelector('.abos-fab');el.window=root.querySelector('.abos-window');el.body=root.querySelector('.abos-body');
    el.form=root.querySelector('.abos-composer');el.input=root.querySelector('.abos-input');el.send=root.querySelector('.abos-send');
    el.min=root.querySelector('.abos-min');el.close=root.querySelector('.abos-close');
    bind();addMessage('bot',GREETING);state.history.push({role:'assistant',content:GREETING});
  }
  function bind(){
    el.fab.addEventListener('click',toggle);el.close.addEventListener('click',close);el.min.addEventListener('click',minimize);
    el.form.addEventListener('submit',onSubmit);
    el.input.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();onSubmit(e);}});
    el.input.addEventListener('input',function(){el.input.style.height='auto';el.input.style.height=Math.min(el.input.scrollHeight,120)+'px';});
    el.window.addEventListener('keydown',function(e){if(e.key==='Escape'){close();el.fab.focus();}});
  }
  function addMessage(kind,text){var d=document.createElement('div');d.className='abos-msg '+(kind==='user'?'abos-msg-user':kind==='error'?'abos-msg-error':'abos-msg-bot');d.innerHTML=esc(text);el.body.appendChild(d);scrollToBottom();return d;}
  function showTyping(){var t=document.createElement('div');t.className='abos-typing';t.setAttribute('aria-label','Assistente está digitando');t.innerHTML='<i></i><i></i><i></i>';el.body.appendChild(t);scrollToBottom();return t;}
  function open(){state.open=true;state.minimized=false;el.root.setAttribute('data-open','true');el.root.setAttribute('data-minimized','false');el.window.hidden=false;el.fab.setAttribute('aria-expanded','true');el.fab.setAttribute('aria-label','Fechar o Assistente de Avaliação');setTimeout(function(){el.input&&el.input.focus();},60);scrollToBottom();}
  function close(){state.open=false;el.root.setAttribute('data-open','false');el.window.hidden=true;el.fab.setAttribute('aria-expanded','false');el.fab.setAttribute('aria-label','Abrir o Assistente de Avaliação');}
  function toggle(){state.open?close():open();}
  function minimize(){state.minimized=!state.minimized;el.root.setAttribute('data-minimized',state.minimized?'true':'false');el.min.setAttribute('aria-label',state.minimized?'Restaurar janela do chat':'Minimizar janela do chat');if(!state.minimized){el.input.focus();scrollToBottom();}}
  function onSubmit(e){if(e&&e.preventDefault)e.preventDefault();if(state.sending)return;var text=(el.input.value||'').trim();if(!text)return;addMessage('user',text);state.history.push({role:'user',content:text});el.input.value='';el.input.style.height='auto';send();}
  function setSending(v){state.sending=v;el.send.disabled=v;el.input.disabled=v;}
  function send(){setSending(true);var typing=showTyping();
    var payload={messages:state.history.slice(-20),projectEvaluation:state.evaluation||null};
    var transport=window.ABOS_CHAT_TRANSPORT||defaultTransport;
    Promise.resolve(transport({messages:payload.messages,projectEvaluation:payload.projectEvaluation,endpoint:endpoint})).then(function(result){
      typing.remove();var reply=result&&result.reply?result.reply:'Tripulante, não consegui gerar uma resposta agora. Pode tentar novamente?';
      addMessage('bot',reply);state.history.push({role:'assistant',content:reply});
    }).catch(function(err){typing.remove();var msg=(err&&err.userMessage)?err.userMessage:'Tripulante, tive um problema para concluir a avaliação agora. Verifique sua conexão e tente novamente.';addMessage('error',msg);}).then(function(){setSending(false);el.input.focus();});
  }
  function defaultTransport(opts){return fetch(opts.endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:opts.messages,projectEvaluation:opts.projectEvaluation})}).then(function(res){return res.json().catch(function(){return null;}).then(function(data){if(!res.ok){var e=new Error('HTTP '+res.status);e.userMessage=(data&&data.error)||'Tripulante, o serviço de avaliação está indisponível no momento.';throw e;}return data||{};});});}
  window.AbosChatbot={open:open,close:close,toggle:toggle,minimize:minimize,
    setEvaluation:function(ev){state.evaluation=ev||null;},
    reset:function(){state.history=[];if(el.body)el.body.innerHTML='';addMessage('bot',GREETING);state.history.push({role:'assistant',content:GREETING});}};
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',build);else build();
})();
</script>

  {id:'n2',user:'u3',tipo:'Diretor aprovou',msg:'"Campanha Campinas–Orlando" foi liberada para análise do Marketing.',data:'Há 1 dia',unread:true},

/* =========================================================
   ESTADO / NAVEGAÇÃO
   ========================================================= */
const NAV = [
  {id:'projetos',ico:'📁',label:'Meus Projetos'},
  {id:'dashboard',ico:'📊',label:'Dashboard'},
  {id:'reunioes',ico:'📅',label:'Reuniões'},
  {id:'notificacoes',ico:'🔔',label:'Notificações'},
];
let state={screen:'login',persona:'u1',view:'projetos',proj:null,tab:'geral',fStatus:'',fVert:'',fBusca:''};

const userById=id=>USERS.find(u=>u.id===id)||{nome:'—',cargo:''};
const vertById=id=>(VERTENTES.find(v=>v.id===id)||{nome:'—'}).nome;
const initials=n=>n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const money=v=>'R$ '+v.toLocaleString('pt-BR');
/* Prazo de resposta do Marketing (SLA) — data de referência do protótipo: 15/07/2026 */
const HOJE=new Date(2026,6,15);
function parseISO(d){const a=String(d).split('-').map(Number);return new Date(a[0],a[1]-1,a[2]);}
function isMarketing(cargo){return cargo==='Membro do Marketing'||cargo==='Coordenador de Marketing';}
function prazoInfo(x){
  if(!x.prazoResposta)return null;
  const dt=parseISO(x.prazoResposta);
  const diff=Math.round((dt-HOJE)/86400000);
  const br=dt.toLocaleDateString('pt-BR');
  if(diff<0)return{cls:'prazo-late',txt:'⏰ Resposta vencida há '+(-diff)+' dia(s) (era '+br+')',late:true};
  if(diff===0)return{cls:'prazo-late',txt:'⏰ Responder ainda hoje ('+br+')',late:false};
  if(diff<=2)return{cls:'prazo-warn',txt:'⏳ Responder em '+diff+' dia(s) · até '+br,late:false};
  return{cls:'prazo-ok',txt:'🗓️ Responder até '+br+' · faltam '+diff+' dias',late:false};
}

function setPersona(id){state.persona=id;state.view='projetos';state.proj=null;render()}
function go(view){state.view=view;state.proj=null;render();window.scrollTo(0,0)}
function openProj(id){state.proj=id;state.view='detalhe';state.tab='geral';render();window.scrollTo(0,0)}
function setTab(t){state.tab=t;render()}

/* visibilidade de comentário conforme persona (RN-04) */
function canSeeComment(c){
  const p=userById(state.persona);
  if(c.vis==='publico')return true;
  // interno: só Marketing
  return ['Membro do Marketing','Coordenador de Marketing'].includes(p.cargo);
}
/* projetos visíveis conforme persona */
function visibleProjects(){
  const p=userById(state.persona);
  let list=[...PROJETOS];
  if(p.cargo==='Tripulante de Vertente')list=list.filter(x=>x.vert===p.vert);
  if(p.cargo==='Diretor de Vertente')list=list.filter(x=>x.vert===p.vert);
  if(p.cargo==='Membro do Marketing')list=list.filter(x=>['analise','aprovado','divulgacao','concluido'].includes(x.status));
  if(p.cargo==='Coordenador de Marketing')list=list.filter(x=>['analise','aprovado','divulgacao','concluido'].includes(x.status));
  // Administrador vê todos
  return list;
}

/* =========================================================
   RENDER
   ========================================================= */
function render(){
  const topbar=document.querySelector('.topbar'),shell=document.querySelector('.shell'),auth=document.getElementById('authHost');
  if(state.screen!=='app'){
    topbar.style.display='none';shell.style.display='none';auth.style.display='block';
    auth.innerHTML=state.screen==='login'?loginScreen():pickScreen();
    var _cb=document.getElementById('abos-chatbot-root');if(_cb)_cb.style.display='none';if(window.AbosChatbot)window.AbosChatbot.close();
    return;
  }
  topbar.style.display='';shell.style.display='';auth.style.display='none';
  renderPersonaSelect();
  const p=userById(state.persona);
  document.getElementById('avatar').textContent=initials(p.nome);
  document.getElementById('bellCount').textContent=NOTIFS.filter(n=>n.user===state.persona&&n.unread).length||'';
  renderSidebar();
  const m=document.getElementById('main');
  if(state.view==='projetos')m.innerHTML=viewProjetos();
  else if(state.view==='detalhe')m.innerHTML=viewDetalhe();
  else if(state.view==='dashboard')m.innerHTML=viewDashboard();
  else if(state.view==='reunioes')m.innerHTML=viewReunioes();
  else if(state.view==='notificacoes')m.innerHTML=viewNotificacoes();
  else if(state.view==='admin')m.innerHTML=viewAdmin();
  updateChatbotVisibility();
}
function renderPersonaSelect(){
  const s=document.getElementById('personaSel');
  s.innerHTML=USERS.map(u=>`<option value="${u.id}" ${u.id===state.persona?'selected':''}>${u.nome} — ${u.cargo}</option>`).join('');
}
function renderSidebar(){
  const p=userById(state.persona);
  let items=NAV.filter(n=>n.id!=='dashboard'||['Diretor de Vertente','Coordenador de Marketing'].includes(p.cargo));
  if(p.cargo==='Administrador')items=[{id:'admin',ico:'⚙️',label:'Administração'},...items];
  const pend=NOTIFS.filter(n=>n.user===state.persona&&n.unread).length;
  document.getElementById('sidebar').innerHTML=
    `<div class="side-label">Navegação</div>`+
    items.map(n=>{
      const badge=(n.id==='notificacoes'&&pend)?`<span class="badge">${pend}</span>`:'';
      const active=(state.view===n.id||(state.view==='detalhe'&&n.id==='projetos'))?'active':'';
      return `<div class="nav-item ${active}" onclick="go('${n.id}')"><span class="ico">${n.ico}</span>${n.label}${badge}</div>`;
    }).join('')+
    `<div class="side-label">Sessão</div>
     <div style="padding:10px 14px;background:var(--azul-soft);border-radius:10px">
       <div style="font-weight:700;font-size:13px">${p.nome}</div>
       <div style="font-size:11px;color:var(--mut);margin-top:2px">${p.cargo}</div>
       <div style="font-size:11px;color:var(--mut)">${p.vert!=='-' && p.vert!=='mkt'?vertById(p.vert):(p.vert==='mkt'?'Marketing':'—')}</div>
     </div>`;
}

/* ---------- MEUS PROJETOS ---------- */
function viewProjetos(){
  const p=userById(state.persona);
  let list=visibleProjects();
  if(state.fStatus)list=list.filter(x=>x.status===state.fStatus);
  if(state.fVert)list=list.filter(x=>x.vert===state.fVert);
  if(state.fBusca)list=list.filter(x=>x.nome.toLowerCase().includes(state.fBusca.toLowerCase()));
  const canCreate=p.cargo==='Tripulante de Vertente';
  const heads={'Tripulante de Vertente':'Projetos que você criou','Diretor de Vertente':'Projetos da sua vertente','Membro do Marketing':'Projetos aguardando parecer','Coordenador de Marketing':'Pendências de aprovação','Administrador':'Todos os projetos'};
  let mktBanner='';
  if(isMarketing(p.cargo)){
    const pend=list.filter(x=>x.status==='analise');
    const atrasados=pend.filter(x=>{const i=prazoInfo(x);return i&&i.late;});
    if(pend.length)mktBanner=`<div class="banner">📅 Você tem <b>${pend.length}</b> projeto(s) aguardando sua resposta${atrasados.length?` — <b style="color:#6D2077">${atrasados.length} com prazo vencido</b>`:''}. Responda dentro do prazo indicado em cada card.</div>`;
  }
  return `
  <div class="page-head">
    <div><h1>${heads[p.cargo]||'Projetos'}</h1><p>${list.length} projeto(s) · visão de ${p.cargo}</p></div>
    ${canCreate?`<button class="btn" onclick="modalCriar()">＋ Criar projeto</button>`:''}
  </div>
  ${p.cargo==='Diretor de Vertente'?`<div class="banner">📌 Você tem <b>${PROJETOS.filter(x=>x.status==='revisao'&&x.vert===p.vert).length}</b> projeto(s) aguardando sua revisão.</div>`:''}
  ${mktBanner}
  <div class="filters">
    <input placeholder="🔎 Buscar projeto..." value="${state.fBusca}" oninput="state.fBusca=this.value;render()">
    <select onchange="state.fStatus=this.value;render()"><option value="">Todos os status</option>${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${state.fStatus===k?'selected':''}>${v.label}</option>`).join('')}</select>
    <select onchange="state.fVert=this.value;render()"><option value="">Todas as vertentes</option>${VERTENTES.map(v=>`<option value="${v.id}" ${state.fVert===v.id?'selected':''}>${v.nome}</option>`).join('')}</select>
  </div>
  ${list.length?`<div class="proj-list">${list.map(projCard).join('')}</div>`:`<div class="empty"><div class="big">📭</div>Nenhum projeto encontrado para os filtros atuais.</div>`}`;
}
function projCard(x){
  const st=STATUS[x.status];const nc=COMENTARIOS.filter(c=>c.proj===x.id).length;const na=ANEXOS.filter(a=>a.proj===x.id).length;
  const pu=userById(state.persona);
  const pi=(isMarketing(pu.cargo)&&x.status==='analise')?prazoInfo(x):null;
  return `<div class="proj-card" style="border-left-color:${st.color}" onclick="openProj('${x.id}')">
    <div style="display:flex;justify-content:space-between;align-items:start;gap:8px">
      <h3>${x.nome}</h3><span class="badge-status ${st.cls}">${st.label}</span>
    </div>
    <div class="proj-meta"><span class="tag-vert">${vertById(x.vert)}</span></div>
    <p style="color:var(--mut);font-size:12.5px">${x.objetivo}</p>
    ${pi?`<div class="prazo ${pi.cls}">${pi.txt}</div>`:''}
    <div class="proj-foot">
      <span class="mini">👤 ${userById(x.criador).nome.split(' ')[0]} · ${x.criadoEm}</span>
      <span class="mini">💬 ${nc} · 📎 ${na}</span>
    </div>
  </div>`;
}

/* ---------- DETALHE ---------- */

  const x=PROJETOS.find(p=>p.id===state.proj);const st=STATUS[x.status];const p=userById(state.persona);
  const tabs=[['geral','Visão geral'],['comentarios','Comentários'],['anexos','Anexos'],['reunioes','Reuniões'],['historico','Histórico']];
  return `
  <div style="margin-bottom:10px"><button class="btn ghost sm" onclick="go('projetos')">← Voltar</button></div>
  <div class="page-head">
    <div><h1>${x.nome}</h1><p><span class="tag-vert">${vertById(x.vert)}</span> · Criado por ${userById(x.criador).nome} em ${x.criadoEm}</p></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span class="badge-status ${st.cls}" style="font-size:13px;padding:6px 14px">${st.label}</span>

  <div class="tabs">${tabs.map(([id,l])=>`<div class="tab ${state.tab===id?'active':''}" onclick="setTab('${id}')">${l}</div>`).join('')}</div>
  ${state.tab==='geral'?tabGeral(x):''}
  ${state.tab==='comentarios'?tabComentarios(x):''}

  ${state.tab==='reunioes'?tabReunioes(x):''}

function actionsFor(x,p){
  if(p.cargo==='Diretor de Vertente'&&x.status==='revisao'&&x.vert===p.vert)
    return `<button class="btn grn sm" onclick="act('aprovou para análise')">✔ Aprovar p/ Marketing</button><button class="btn danger sm" onclick="act('devolveu para ajustes')">↩ Devolver</button>`;
  if(p.cargo==='Coordenador de Marketing'&&x.status==='analise')
    return `<button class="btn grn sm" onclick="act('aprovou o projeto')">✔ Aprovar</button><button class="btn danger sm" onclick="act('reprovou o projeto')">✖ Reprovar</button><button class="btn ora sm" onclick="modalReuniao('${x.id}')">📅 Agendar reunião</button>`;
  if(p.cargo==='Tripulante de Vertente'&&x.status==='rascunho'&&x.criador===p.id)
    return `<button class="btn sm" onclick="act('submeteu ao Diretor')">➤ Submeter ao Diretor</button>`;
  return '';
}

/* ---------- DASHBOARD ---------- */
function viewDashboard(){
  const pu=userById(state.persona);
  const isDir=pu.cargo==='Diretor de Vertente';
  let scope=[...PROJETOS], scopeLabel='Visão consolidada de todos os projetos · reuniões de desempenho';
  if(isDir){scope=PROJETOS.filter(x=>x.vert===pu.vert);scopeLabel='Projetos da vertente '+vertById(pu.vert);}
  const byStatus={};Object.keys(STATUS).forEach(k=>byStatus[k]=scope.filter(p=>p.status===k).length);
  const orcTotal=scope.reduce((s,p)=>s+p.orc,0);
  const funnel=[['rascunho','Rascunho'],['revisao','Em revisão'],['analise','Em análise'],['aprovado','Aprovado'],['divulgacao','Em divulgação'],['concluido','Concluído']];
  const maxF=Math.max(...Object.values(byStatus),1);
  const byVert=VERTENTES.filter(v=>scope.some(p=>p.vert===v.id)).map(v=>({nome:v.nome,n:scope.filter(p=>p.vert===v.id).length}));
  const maxV=Math.max(...byVert.map(v=>v.n),1);
  const maxOrc=Math.max(...scope.map(p=>p.orc),1);
  const mcolors=['#0060B7','#00A3E0','#43B02A','#FFC72C','#00875A','#6D2077'];
  if(!scope.length)return `<div class="page-head"><div><h1>Dashboard</h1><p>${scopeLabel}</p></div></div><div class="empty"><div class="big">📊</div>Ainda não há projetos para exibir.</div>`;
  return `
  <div class="page-head"><div><h1>Dashboard${isDir?'':' Executivo'}</h1><p>${scopeLabel}</p></div>
    <button class="btn ghost" onclick="toast('Exportação simulada (PDF)')">⬇ Exportar PDF</button></div>
  <div class="stat-row">
    <div class="stat"><div class="n">${scope.length}</div><div class="t">Projetos${isDir?' na vertente':' ativos'}</div></div>
    <div class="stat"><div class="n">${byStatus.analise}</div><div class="t">Em análise no Marketing</div></div>
    <div class="stat"><div class="n">${byStatus.concluido}</div><div class="t">Concluídos</div></div>
    <div class="stat"><div class="n" style="font-size:22px">${money(orcTotal)}</div><div class="t">Orçamento planejado total</div></div>
  </div>
  <div class="charts">
    <div class="card"><div class="chart-title">Funil de projetos por status</div>
      <div class="funnel">${funnel.map(([k,l])=>{const w=40+(byStatus[k]/maxF)*55;return `<div class="fseg" style="width:${w}%;background:${STATUS[k].color}">${l}: ${byStatus[k]}</div>`}).join('')}</div>
    </div>
    <div class="card"><div class="chart-title">Projetos por vertente</div>
      ${byVert.map((v,i)=>`<div class="bar-row"><div class="lbl">${v.nome}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(v.n/maxV*100,8)}%;background:${mcolors[i%mcolors.length]}">${v.n}</div></div></div>`).join('')}
    </div>
    <div class="card"><div class="chart-title">Orçamento planejado por projeto</div>
      ${scope.map(p=>`<div class="bar-row"><div class="lbl" style="width:150px">${p.nome.slice(0,20)}…</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(p.orc/maxOrc*100,10)}%;background:var(--azul)">${money(p.orc)}</div></div></div>`).join('')}
    </div>
    <div class="card"><div class="chart-title">Distribuição por status</div>
      <div class="donut-wrap">
        ${donut(byStatus)}
        <div class="legend">${Object.entries(STATUS).map(([k,v])=>`<div><span class="sw" style="background:${v.color}"></span>${v.label} (${byStatus[k]})</div>`).join('')}</div>
      </div>
    </div>
  </div>`;
}
function donut(byStatus){
  const total=Object.values(byStatus).reduce((a,b)=>a+b,0)||1;let acc=0;const segs=[];
  Object.entries(STATUS).forEach(([k,v])=>{const frac=byStatus[k]/total;if(frac>0){const a0=acc*360,a1=(acc+frac)*360;segs.push(`${v.color} ${a0}deg ${a1}deg`);acc+=frac}});
  return `<div style="width:150px;height:150px;border-radius:50%;background:conic-gradient(${segs.join(',')})"><div style="width:80px;height:80px;background:#fff;border-radius:50%;position:relative;top:35px;left:35px;display:grid;place-items:center;font-weight:800;color:var(--azul-deep)">${total}</div></div>`;
}

function updateChatbotVisibility(){
  var root=document.getElementById('abos-chatbot-root');
  if(!root)return;
  var show=false,ev=null;
  // Disponível apenas para o Tripulante de Vertente: a triagem por IA é ferramenta
  // da vertente para ajustar a proposta antes de ela chegar (pronta) ao Marketing.
  if(state.screen==='app'&&state.view==='detalhe'&&state.proj&&userById(state.persona).cargo==='Tripulante de Vertente'){
    var x=PROJETOS.find(p=>p.id===state.proj);
    if(x&&['analise','aprovado','divulgacao','concluido'].includes(x.status)){show=true;ev=EVALS[x.id]||null;}
  }
  if(show&&window.AbosChatbot){
    if(window._abosProj!==state.proj){window.AbosChatbot.setEvaluation(ev);window.AbosChatbot.reset();window._abosProj=state.proj;}
    root.style.display='';
  }else{
    root.style.display='none';
    if(window.AbosChatbot)window.AbosChatbot.close();
    window._abosProj=null;
  }
}
